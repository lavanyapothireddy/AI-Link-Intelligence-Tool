<!DOCTYPE html>
<html>
<head>
    <title>AI Link Intelligence Tool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🧠 AI Link Intelligence Tool</h1>

    <input id="urlInput" type="text" placeholder="Enter URL">

    <button onclick="analyzeLink()">Analyze Link</button>

    <p id="status"></p>

    <div class="box">
        <p><b>URL:</b> <span id="url"></span></p>
        <p><b>Summary:</b> <span id="summary"></span></p>
        <p><b>Category:</b> <span id="category"></span></p>
        <p><b>Safety:</b> <span id="safety"></span></p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
